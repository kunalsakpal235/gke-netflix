apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: { name: streaming-dev, namespace: argocd }
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_GH/streaming-platform.git
    targetRevision: main
    path: charts/streaming
    helm:
      valueFiles: ["../../gitops/environments/dev/values.yaml"]
  destination: { server: https://kubernetes.default.svc, namespace: streaming }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
