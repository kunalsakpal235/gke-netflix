apiVersion: v1
kind: Pod
spec:
  serviceAccountName: ci-builder      # Workload-Identity-bound (see runbook Phase 9)
  containers:
    - name: kaniko
      image: gcr.io/kaniko-project/executor:debug
      command: ["/busybox/cat"]
      tty: true
    - name: tools
      image: alpine:3.20               # holds trivy, git, yq, sonar-scanner (install in stage)
      command: ["cat"]
      tty: true
