apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: streaming
  labels:
    app: api-gateway
spec:
  replicas: 1   # quota-safe baseline for a free-tier project; bump to 2 only for the Phase 11 HA drill, then scale back
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      serviceAccountName: streaming-workloads@devops-1-502311.iam.gserviceaccount.com
      containers:
        - name: api-gateway
          image: asia-south1-docker.pkg.dev/devops-1-502311/streaming-images/api-gateway:40ebf65
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: CATALOG_URL
              value: "http://catalog-service"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      tolerations:
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
