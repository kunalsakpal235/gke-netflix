apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-intra-namespace, namespace: streaming }
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from: [{ podSelector: {} }]
  egress:
    - to: [{ podSelector: {} }]
---
# Required for the Ingress/Gateway Load Balancer to reach pods at all — 130.211.0.0/22 and
# 35.191.0.0/16 are Google's fixed health-check + Application Load Balancer proxy ranges.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-lb-ingress, namespace: streaming }
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - ipBlock: { cidr: 130.211.0.0/22 }
        - ipBlock: { cidr: 35.191.0.0/16 }
